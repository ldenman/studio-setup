<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#2a2825" />

  <!-- Wing console (left) -->
  <rect x="60" y="100" width="200" height="220" rx="6" fill="none" stroke="#4a4740" stroke-width="1.5" />
  <text x="160" y="88" font-family="monospace" font-size="11" fill="#b8792a" text-anchor="middle">WING</text>

  <!-- Channel strips on Wing -->
  <!-- Ch1-6 (faded, not focused) -->
  <rect x="80" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="98" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="116" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="134" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="152" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="170" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />

  <!-- Ch7 - highlighted solo channel -->
  <rect x="188" y="125" width="18" height="90" rx="2" fill="none" stroke="#b8792a" stroke-width="2" />
  <!-- Fader knob on Ch7 -->
  <rect x="191" y="175" width="12" height="8" rx="1" fill="#b8792a" data-fader="125,207"/>
  <!-- Solo button - glowing -->
  <circle cx="197" cy="230" r="8" fill="#b8792a" opacity="0.8" />
  <circle cx="197" cy="230" r="12" fill="none" stroke="#b8792a" stroke-width="0.5" opacity="0.3" />
  <circle cx="197" cy="230" r="16" fill="none" stroke="#b8792a" stroke-width="0.3" opacity="0.15" />
  <text x="197" y="233" font-family="monospace" font-size="7" fill="#2a2825" text-anchor="middle" font-weight="bold">S</text>

  <!-- Ch7 label -->
  <text x="197" y="260" font-family="monospace" font-size="7" fill="#b8792a" text-anchor="middle">CH7</text>

  <!-- More channels after (faded) -->
  <rect x="210" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />
  <rect x="228" y="130" width="14" height="80" rx="2" fill="none" stroke="#4a4740" stroke-width="0.8" opacity="0.3" />

  <!-- Headphone output from Wing -->
  <path d="M 130 320 Q 130 340, 145 345 Q 160 350, 175 345 Q 190 340, 190 320" fill="none" stroke="#f4f3ee" stroke-width="1.5" opacity="0.7" />
  <rect x="125" y="316" width="10" height="16" rx="3" fill="none" stroke="#f4f3ee" stroke-width="1.5" opacity="0.7" />
  <rect x="185" y="316" width="10" height="16" rx="3" fill="none" stroke="#f4f3ee" stroke-width="1.5" opacity="0.7" />
  <text x="160" y="370" font-family="monospace" font-size="8" fill="#f4f3ee" text-anchor="middle" opacity="0.5">PHONES</text>

  <!-- Model 12 (right) -->
  <rect x="540" y="100" width="200" height="220" rx="6" fill="none" stroke="#4a4740" stroke-width="1.5" />
  <text x="640" y="88" font-family="monospace" font-size="11" fill="#4a7a9a" text-anchor="middle">MODEL 12</text>

  <!-- Model 12 faders -->
  <rect x="560" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="563" y="165" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="580" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="583" y="155" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="600" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="603" y="170" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="620" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="623" y="150" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="640" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="643" y="160" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="660" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="663" y="145" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="680" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="683" y="158" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>
  <rect x="700" y="130" width="12" height="70" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.6" />
  <rect x="703" y="162" width="6" height="6" rx="1" fill="#4a7a9a" opacity="0.6" data-fader="130,194"/>

  <!-- Master fader on Model 12 -->
  <rect x="710" y="220" width="16" height="80" rx="2" fill="none" stroke="#4a7a9a" stroke-width="1.5" opacity="0.8" />
  <rect x="712" y="260" width="12" height="8" rx="1" fill="#4a7a9a" opacity="0.7" data-fader="220,292"/>
  <text x="718" y="312" font-family="monospace" font-size="7" fill="#4a7a9a" text-anchor="middle" opacity="0.6">MST</text>

  <!-- Stereo mix output label -->
  <text x="640" y="245" font-family="monospace" font-size="8" fill="#4a7a9a" text-anchor="middle" opacity="0.6">STEREO MIX</text>

  <!-- USB connection: Model 12 → Wing -->
  <!-- Arrow path going from Model 12 output down and around to Wing Ch7 -->
  <path d="M 540 270 L 460 270 Q 400 270, 400 310 Q 400 350, 340 350 L 260 350 Q 230 350, 230 310 L 230 260 Q 230 240, 210 240" fill="none" stroke="#4a7a9a" stroke-width="1.5" stroke-dasharray="8,4" />
  <polygon points="212,236 205,240 212,244" fill="#4a7a9a" />

  <!-- USB label on connection -->
  <rect x="410" y="255" width="40" height="16" rx="3" fill="#2a2825" stroke="#4a4740" stroke-width="0.8" />
  <text x="430" y="266" font-family="monospace" font-size="8" fill="#4a7a9a" text-anchor="middle">USB</text>

  <!-- State labels -->
  <!-- Solo OFF state -->
  <text x="400" y="45" font-family="monospace" font-size="10" fill="#f4f3ee" text-anchor="middle" opacity="0.4">SOLO OFF = tracking mix</text>

  <!-- Solo ON state -->
  <text x="400" y="65" font-family="monospace" font-size="10" fill="#b8792a" text-anchor="middle">SOLO ON = Model 12 mix</text>

  <!-- Speaker icon (top right area) -->
  <rect x="80" y="275" width="14" height="22" rx="2" fill="none" stroke="#f4f3ee" stroke-width="1" opacity="0.4" />
  <polygon points="94,270 112,258 112,300 94,297" fill="none" stroke="#f4f3ee" stroke-width="1" opacity="0.4" />
  <path d="M 118 270 Q 128 280, 118 290" fill="none" stroke="#f4f3ee" stroke-width="0.8" opacity="0.3" />
  <text x="96" y="310" font-family="monospace" font-size="7" fill="#f4f3ee" text-anchor="middle" opacity="0.3">MX1</text>

  <!-- GPIO footswitch hint -->
  <rect x="620" y="340" width="60" height="30" rx="15" fill="none" stroke="#5a8a4a" stroke-width="1" opacity="0.5" />
  <circle cx="650" cy="355" r="6" fill="none" stroke="#5a8a4a" stroke-width="1" opacity="0.5" />
  <text x="650" y="385" font-family="monospace" font-size="7" fill="#5a8a4a" text-anchor="middle" opacity="0.5">GPIO</text>
</svg>
