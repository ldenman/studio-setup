<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Patchbay panel background -->
  <rect x="100" y="80" width="600" height="140" rx="4" fill="#2a2825" stroke="#4a4740" stroke-width="2" />

  <!-- Patchbay rows - top row (normals) -->
  <g>
    <!-- Row label -->
    <text x="120" y="125" font-family="monospace" font-size="9" fill="#4a4740">NORM</text>
    <!-- TRS jacks - top row -->
    <circle cx="200" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="200" cy="120" r="3" fill="#4a4740" />
    <circle cx="240" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="240" cy="120" r="3" fill="#4a4740" />
    <circle cx="280" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="280" cy="120" r="3" fill="#4a4740" />
    <circle cx="320" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="320" cy="120" r="3" fill="#4a4740" />
    <circle cx="360" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="360" cy="120" r="3" fill="#4a4740" />
    <circle cx="400" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="400" cy="120" r="3" fill="#4a4740" />
    <circle cx="440" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="440" cy="120" r="3" fill="#4a4740" />
    <circle cx="480" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="480" cy="120" r="3" fill="#4a4740" />
    <circle cx="520" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="520" cy="120" r="3" fill="#4a4740" />
    <circle cx="560" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="560" cy="120" r="3" fill="#4a4740" />
    <circle cx="600" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="600" cy="120" r="3" fill="#4a4740" />
    <circle cx="640" cy="120" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="640" cy="120" r="3" fill="#4a4740" />
  </g>

  <!-- Bottom row -->
  <g>
    <text x="120" y="175" font-family="monospace" font-size="9" fill="#4a4740">PATCH</text>
    <circle cx="200" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="200" cy="170" r="3" fill="#4a4740" />
    <circle cx="240" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="240" cy="170" r="3" fill="#4a4740" />
    <circle cx="280" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="280" cy="170" r="3" fill="#4a4740" />
    <circle cx="320" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="320" cy="170" r="3" fill="#4a4740" />
    <circle cx="360" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="360" cy="170" r="3" fill="#4a4740" />
    <circle cx="400" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="400" cy="170" r="3" fill="#4a4740" />
    <circle cx="440" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="440" cy="170" r="3" fill="#4a4740" />
    <circle cx="480" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="480" cy="170" r="3" fill="#4a4740" />
    <circle cx="520" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="520" cy="170" r="3" fill="#4a4740" />
    <circle cx="560" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="560" cy="170" r="3" fill="#4a4740" />
    <circle cx="600" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="600" cy="170" r="3" fill="#4a4740" />
    <circle cx="640" cy="170" r="8" fill="none" stroke="#4a4740" stroke-width="1.5" />
    <circle cx="640" cy="170" r="3" fill="#4a4740" />
  </g>

  <!-- XLR connector bypassing the patchbay - direct connection -->
  <!-- XLR jack shape (simplified 3-pin) -->
  <g transform="translate(400, 310)">
    <!-- XLR housing -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#4a7a9a" stroke-width="2" />
    <circle cx="0" cy="0" r="16" fill="none" stroke="#4a7a9a" stroke-width="1" />
    <!-- 3 pins -->
    <circle cx="0" cy="-8" r="2.5" fill="#4a7a9a" />
    <circle cx="-7" cy="5" r="2.5" fill="#4a7a9a" />
    <circle cx="7" cy="5" r="2.5" fill="#4a7a9a" />
  </g>

  <!-- Direct XLR cable path bypassing patchbay -->
  <path d="M 250 310 C 300 310 350 310 378 310" stroke="#4a7a9a" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M 422 310 C 450 310 550 310 600 310" stroke="#4a7a9a" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Mic silhouette on left -->
  <g transform="translate(220, 310)">
    <ellipse cx="0" cy="-20" rx="10" ry="14" fill="none" stroke="#4a7a9a" stroke-width="1.5" />
    <line x1="0" y1="-6" x2="0" y2="10" stroke="#4a7a9a" stroke-width="1.5" />
    <line x1="-8" y1="10" x2="8" y2="10" stroke="#4a7a9a" stroke-width="1.5" />
  </g>

  <!-- Wing input on right -->
  <rect x="610" y="295" width="60" height="30" rx="3" fill="none" stroke="#4a7a9a" stroke-width="1.5" />
  <text x="640" y="314" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="middle">LCL/3</text>

  <!-- Phantom power indicator - warning -->
  <text x="400" y="265" font-family="monospace" font-size="11" fill="#b8792a" text-anchor="middle" font-weight="bold">48V</text>
  <circle cx="400" cy="262" r="18" fill="none" stroke="#b8792a" stroke-width="1.5" stroke-dasharray="4 3" />

  <!-- Gain indicator -->
  <text x="540" y="265" font-family="monospace" font-size="10" fill="#a85a4a" text-anchor="middle">+37.5dB</text>

  <!-- Crossed out / warning line through the bypass path -->
  <line x1="340" y1="340" x2="460" y2="280" stroke="#a85a4a" stroke-width="1.5" opacity="0.5" />
  <line x1="340" y1="280" x2="460" y2="340" stroke="#a85a4a" stroke-width="1.5" opacity="0.5" />

  <!-- Labels -->
  <text x="400" y="50" font-family="monospace" font-size="14" fill="#4a4740" text-anchor="middle" letter-spacing="3">PATCHBAY</text>
  <text x="220" y="365" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="middle">CONDENSER</text>
  <text x="640" y="345" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="middle">WING INPUT</text>
  <text x="400" y="385" font-family="monospace" font-size="10" fill="#b8792a" text-anchor="middle">DIRECT XLR -- BYPASSES PATCHBAY</text>
</svg>
