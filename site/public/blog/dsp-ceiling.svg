    <rect x="595" y="0" width="75" height="100" rx="4" fill="#4a7a9a" opacity="0.6"/>
    <text x="632.5" y="20" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="11" font-weight="bold">FX8</text>
    <rect x="610" y="30" width="45" height="55" rx="2" fill="#2a2825" opacity="0.4"/>
    <text x="632.5" y="55" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="8">DLY</text>
    <text x="632.5" y="70" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="7">LOADED</text>
