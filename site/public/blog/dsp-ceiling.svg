  <!-- Row labels -->
  <text x="40" y="145" text-anchor="end" fill="#4a4740" font-family="monospace" font-size="9" transform="rotate(-90, 40, 145)">PREMIUM</text>
  <text x="40" y="285" text-anchor="end" fill="#4a4740" font-family="monospace" font-size="9" transform="rotate(-90, 40, 285)">STANDARD</text>

  <!-- Row 2: Standard slots 9-16 -->
  <g transform="translate(60, 220)">
    <!-- Slot 9 - loaded -->
    <rect x="0" y="0" width="75" height="100" rx="4" fill="#5a8a4a" opacity="0.6"/>
    <text x="37.5" y="20" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="11" font-weight="bold">FX9</text>
