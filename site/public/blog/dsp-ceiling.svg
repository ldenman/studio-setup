    <text x="37.5" y="55" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="8">EQ</text>
    <text x="37.5" y="70" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="7">LOADED</text>

    <!-- Slots 10-15 empty -->
