    <text x="122.5" y="20" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="11" font-weight="bold">FX10</text>
    <text x="122.5" y="60" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="8">NONE</text>

    <rect x="170" y="0" width="75" height="100" rx="4" fill="#5a8a4a" opacity="0.6"/>
    <text x="207.5" y="20" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="11" font-weight="bold">FX11</text>
    <rect x="185" y="30" width="45" height="55" rx="2" fill="#2a2825" opacity="0.4"/>
    <text x="207.5" y="55" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="8">AMP</text>
    <text x="207.5" y="70" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="7">LOADED</text>

    <rect x="255" y="0" width="75" height="100" rx="4" fill="#5a8a4a" opacity="0.6"/>
    <text x="292.5" y="20" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="11" font-weight="bold">FX12</text>
    <rect x="270" y="30" width="45" height="55" rx="2" fill="#2a2825" opacity="0.4"/>
    <text x="292.5" y="55" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="8">AMP</text>
    <text x="292.5" y="70" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="7">LOADED</text>

    <rect x="340" y="0" width="75" height="100" rx="4" fill="#4a4740" opacity="0.4" stroke="#4a4740" stroke-width="1"/>
    <text x="377.5" y="20" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="11" font-weight="bold">FX13</text>
    <text x="377.5" y="60" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="8">NONE</text>

    <rect x="425" y="0" width="75" height="100" rx="4" fill="#4a4740" opacity="0.4" stroke="#4a4740" stroke-width="1"/>
    <text x="462.5" y="20" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="11" font-weight="bold">FX14</text>
    <text x="462.5" y="60" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="8">NONE</text>

    <rect x="510" y="0" width="75" height="100" rx="4" fill="#4a4740" opacity="0.4" stroke="#4a4740" stroke-width="1"/>
    <text x="547.5" y="20" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="11" font-weight="bold">FX15</text>
    <text x="547.5" y="60" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="8">NONE</text>

    <!-- Slot 16 - REFUSED (the star of our story) -->
    <rect x="595" y="0" width="75" height="100" rx="4" fill="none" stroke="#a85a4a" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="632.5" y="20" text-anchor="middle" fill="#a85a4a" font-family="monospace" font-size="11" font-weight="bold">FX16</text>
    <line x1="610" y1="40" x2="655" y2="80" stroke="#a85a4a" stroke-width="2"/>
    <line x1="655" y1="40" x2="610" y2="80" stroke="#a85a4a" stroke-width="2"/>
    <text x="632.5" y="95" text-anchor="middle" fill="#a85a4a" font-family="monospace" font-size="7">REFUSED</text>
  </g>

  <!-- DSP budget bar at bottom -->
  <text x="60" y="355" fill="#f4f3ee" font-family="monospace" font-size="11">DSP BUDGET</text>
  <rect x="160" y="343" width="480" height="16" rx="3" fill="#4a4740" opacity="0.5"/>
  <rect x="160" y="343" width="456" height="16" rx="3" fill="#b8792a" opacity="0.8"/>
  <text x="650" y="355" fill="#f4f3ee" font-family="monospace" font-size="11">95%</text>

  <!-- Subtle label -->
  <text x="400" y="388" text-anchor="middle" fill="#4a4740" font-family="monospace" font-size="10">16 SLOTS IS A BUDGET, NOT A GUARANTEE</text>
</svg>
