<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f4f3ee" />

  <!-- Grid of parameter blocks - representing all the automatable parameters -->
  <!-- Row 1 -->
  <rect x="60" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="155" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="250" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="345" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="440" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="535" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="630" y="60" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />

  <!-- Row 2 -->
  <rect x="60" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="155" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="250" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="345" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="440" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="535" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="630" y="110" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />

