  <rect x="60" y="210" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="155" y="210" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="250" y="210" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="345" y="210" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="440" y="210" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
