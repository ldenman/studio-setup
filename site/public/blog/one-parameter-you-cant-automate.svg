  <rect x="60" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="155" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="250" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />

  <!-- THE one parameter that can't be automated - highlighted, different color -->
  <rect x="345" y="160" width="80" height="36" rx="3" fill="none" stroke="#a85a4a" stroke-width="2.5" />
  <text x="385" y="182" font-family="monospace" font-size="8" fill="#a85a4a" text-anchor="middle">dynsc/src</text>

  <rect x="440" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="535" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />
  <rect x="630" y="160" width="80" height="36" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6" />

