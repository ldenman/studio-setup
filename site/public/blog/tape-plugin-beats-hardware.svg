<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Left side: hardware tape loop (crossed out) -->
  <!-- Tape reel -->
  <circle cx="200" cy="170" r="60" fill="none" stroke="#4a4740" stroke-width="2" opacity="0.4" />
  <circle cx="200" cy="170" r="22" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <circle cx="200" cy="170" r="4" fill="#4a4740" opacity="0.4" />
  <!-- Spokes -->
  <line x1="200" y1="148" x2="200" y2="118" stroke="#4a4740" stroke-width="1" opacity="0.2" />
  <line x1="219" y1="181" x2="240" y2="196" stroke="#4a4740" stroke-width="1" opacity="0.2" />
  <line x1="181" y1="181" x2="160" y2="196" stroke="#4a4740" stroke-width="1" opacity="0.2" />
  <!-- Signal loop path -->
  <path d="M 200 110 L 200 80 L 320 80 L 320 260 L 200 260 L 200 230" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="6 4" />
  <!-- Latency indicator: offset waveform fragments -->
  <path d="M 140 280 Q 155 265 170 280 Q 185 295 200 280 Q 215 265 230 280" stroke="#a85a4a" stroke-width="1.5" fill="none" opacity="0.5" />
  <path d="M 148 280 Q 163 265 178 280 Q 193 295 208 280 Q 223 265 238 280" stroke="#a85a4a" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="3 3" />
  <!-- X through hardware loop -->
  <line x1="120" y1="100" x2="310" y2="250" stroke="#a85a4a" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
  <line x1="310" y1="100" x2="120" y2="250" stroke="#a85a4a" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />

  <!-- Arrow from left to right -->
  <line x1="370" y1="180" x2="430" y2="180" stroke="#b8792a" stroke-width="2" />
  <polygon points="428,174 442,180 428,186" fill="#b8792a" />

  <!-- Right side: inline plugin (clean signal path) -->
  <!-- Track lanes -->
  <line x1="490" y1="90" x2="700" y2="90" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <line x1="490" y1="130" x2="700" y2="130" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <line x1="490" y1="170" x2="700" y2="170" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <line x1="490" y1="210" x2="700" y2="210" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <line x1="490" y1="250" x2="700" y2="250" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <line x1="490" y1="290" x2="700" y2="290" stroke="#b8792a" stroke-width="1.5" opacity="0.7" />
  <!-- Plugin insert boxes on each track -->
  <rect x="570" y="80" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <rect x="570" y="120" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <rect x="570" y="160" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <rect x="570" y="200" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <rect x="570" y="240" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <rect x="570" y="280" width="30" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <!-- Small "T" in each box for tape -->
  <text x="585" y="95" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <text x="585" y="135" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <text x="585" y="175" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <text x="585" y="215" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <text x="585" y="255" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <text x="585" y="295" font-family="monospace" font-size="12" fill="#5a8a4a" text-anchor="middle">T</text>
  <!-- Output dots -->
  <circle cx="700" cy="90" r="3" fill="#b8792a" />
  <circle cx="700" cy="130" r="3" fill="#b8792a" />
  <circle cx="700" cy="170" r="3" fill="#b8792a" />
  <circle cx="700" cy="210" r="3" fill="#b8792a" />
  <circle cx="700" cy="250" r="3" fill="#b8792a" />
  <circle cx="700" cy="290" r="3" fill="#b8792a" />
  <!-- Input dots -->
  <circle cx="490" cy="90" r="3" fill="#b8792a" opacity="0.5" />
  <circle cx="490" cy="130" r="3" fill="#b8792a" opacity="0.5" />
  <circle cx="490" cy="170" r="3" fill="#b8792a" opacity="0.5" />
  <circle cx="490" cy="210" r="3" fill="#b8792a" opacity="0.5" />
  <circle cx="490" cy="250" r="3" fill="#b8792a" opacity="0.5" />
  <circle cx="490" cy="290" r="3" fill="#b8792a" opacity="0.5" />
  <!-- Phase-aligned indicator: clean vertical line through outputs -->
  <line x1="710" y1="80" x2="710" y2="300" stroke="#5a8a4a" stroke-width="1" stroke-dasharray="4 4" opacity="0.5" />
</svg>
