<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#2a2825"/>

  <!-- Signal source block -->
  <rect x="80" y="160" width="120" height="80" rx="6" fill="#4a4740" stroke="#b8792a" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="13" font-weight="bold">USB IN</text>
  <text x="140" y="215" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="11">SOURCE</text>

  <!-- Signal line to channel A -->
  <line x1="200" y1="185" x2="340" y2="145" stroke="#5a8a4a" stroke-width="2.5"/>
  <!-- Signal line to channel B (dashed = dead) -->
  <line x1="200" y1="215" x2="340" y2="255" stroke="#a85a4a" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- Channel A - working -->
  <rect x="340" y="110" width="120" height="70" rx="6" fill="#4a4740" stroke="#5a8a4a" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="13" font-weight="bold">CH A</text>
  <text x="400" y="158" text-anchor="middle" fill="#5a8a4a" font-family="monospace" font-size="11">SIGNAL</text>

  <!-- Channel A meter bars -->
  <rect x="470" y="120" width="6" height="50" rx="2" fill="#4a4740" stroke="#5a8a4a" stroke-width="1"/>
  <rect x="470" y="135" width="6" height="35" rx="2" fill="#5a8a4a" opacity="0.8"/>
  <rect x="480" y="120" width="6" height="50" rx="2" fill="#4a4740" stroke="#5a8a4a" stroke-width="1"/>
  <rect x="480" y="142" width="6" height="28" rx="2" fill="#5a8a4a" opacity="0.6"/>

  <!-- Channel B - dead -->
  <rect x="340" y="220" width="120" height="70" rx="6" fill="#4a4740" stroke="#a85a4a" stroke-width="2" opacity="0.5"/>
  <text x="400" y="250" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="13" font-weight="bold" opacity="0.5">CH B</text>
  <text x="400" y="268" text-anchor="middle" fill="#a85a4a" font-family="monospace" font-size="11" opacity="0.7">SILENCE</text>

  <!-- Channel B meter bars - empty -->
  <rect x="470" y="230" width="6" height="50" rx="2" fill="#4a4740" stroke="#a85a4a" stroke-width="1" opacity="0.3"/>
  <rect x="480" y="230" width="6" height="50" rx="2" fill="#4a4740" stroke="#a85a4a" stroke-width="1" opacity="0.3"/>

  <!-- X mark on dead path -->
  <line x1="260" y1="225" x2="280" y2="245" stroke="#a85a4a" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="225" x2="260" y2="245" stroke="#a85a4a" stroke-width="3" stroke-linecap="round"/>

  <!-- USR workaround arrow -->
  <path d="M 530 145 C 570 145, 570 200, 570 220 L 570 255" stroke="#b8792a" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="564,252 570,265 576,252" fill="#b8792a"/>

  <!-- USR block -->
  <rect x="540" y="268" width="60" height="30" rx="4" fill="#4a4740" stroke="#b8792a" stroke-width="1.5"/>
  <text x="570" y="288" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="11" font-weight="bold">USR</text>

  <!-- Arrow from USR to Channel B fix -->
  <line x1="600" y1="283" x2="650" y2="283" stroke="#b8792a" stroke-width="2"/>

  <!-- Channel B fixed -->
  <rect x="650" y="248" width="120" height="70" rx="6" fill="#4a4740" stroke="#5a8a4a" stroke-width="2"/>
  <text x="710" y="278" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="13" font-weight="bold">CH B</text>
  <text x="710" y="296" text-anchor="middle" fill="#5a8a4a" font-family="monospace" font-size="11">SIGNAL</text>

  <!-- Channel B fixed meter bars -->
  <rect x="680" y="320" width="6" height="30" rx="2" fill="#5a8a4a" opacity="0.7"/>
  <rect x="690" y="325" width="6" height="25" rx="2" fill="#5a8a4a" opacity="0.5"/>

  <!-- Labels -->
  <text x="270" y="100" text-anchor="middle" fill="#a85a4a" font-family="monospace" font-size="10" opacity="0.8">DUPLICATE = DEAD</text>
  <text x="620" y="235" text-anchor="middle" fill="#b8792a" font-family="monospace" font-size="10">TAP VIA USR</text>

  <!-- Title area -->
  <text x="400" y="380" text-anchor="middle" fill="#f4f3ee" font-family="monospace" font-size="12" opacity="0.4">TWO CHANNELS, ONE INPUT, ZERO SIGNAL</text>
</svg>
