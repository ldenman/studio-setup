<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#2a2825"/>

  <!-- Grid lines -->
  <g stroke="#4a4740" stroke-width="0.5" opacity="0.4">
    <line x1="80" y1="60" x2="80" y2="340"/>
    <line x1="200" y1="60" x2="200" y2="340"/>
    <line x1="320" y1="60" x2="320" y2="340"/>
    <line x1="440" y1="60" x2="440" y2="340"/>
    <line x1="560" y1="60" x2="560" y2="340"/>
    <line x1="680" y1="60" x2="680" y2="340"/>
    <line x1="80" y1="120" x2="720" y2="120"/>
    <line x1="80" y1="200" x2="720" y2="200"/>
    <line x1="80" y1="280" x2="720" y2="280"/>
  </g>

  <!-- Axis lines -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#4a4740" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="80" y2="340" stroke="#4a4740" stroke-width="1.5"/>

  <!-- Frequency labels -->
  <text x="80" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">20</text>
  <text x="200" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">60</text>
  <text x="320" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">250</text>
  <text x="440" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">1k</text>
  <text x="560" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">4k</text>
  <text x="640" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">14k</text>
  <text x="720" y="365" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">20k</text>

  <!-- Hz label -->
  <text x="400" y="390" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">Hz</text>

  <!-- dB labels -->
  <text x="68" y="204" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="end">0dB</text>
  <text x="68" y="124" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="end">+12</text>
  <text x="68" y="284" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="end">-12</text>

  <!-- Unfiltered signal - the "before" curve, showing rumble buildup -->
  <path d="M 80,160 C 120,140 160,155 200,170 C 260,190 300,195 360,198 L 500,198 C 560,195 620,185 660,178 C 690,172 710,160 720,150"
        fill="none" stroke="#a85a4a" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- Filtered signal - the "after" curve, clean passband -->
  <!-- HPF slope rising from left -->
  <path d="M 80,340 C 100,338 130,330 150,310 C 170,280 185,240 200,200 L 640,200 C 655,210 665,240 680,280 C 690,310 700,330 720,340"
        fill="none" stroke="#b8792a" stroke-width="2.5"/>

  <!-- Fill under the filtered curve -->
  <path d="M 80,340 C 100,338 130,330 150,310 C 170,280 185,240 200,200 L 640,200 C 655,210 665,240 680,280 C 690,310 700,330 720,340 Z"
        fill="#b8792a" opacity="0.08"/>

  <!-- Cut zone shading - low end -->
  <rect x="80" y="60" width="120" height="280" fill="#a85a4a" opacity="0.06"/>

  <!-- Cut zone shading - high end -->
  <rect x="640" y="60" width="80" height="280" fill="#a85a4a" opacity="0.06"/>

  <!-- HPF marker line -->
  <line x1="200" y1="60" x2="200" y2="340" stroke="#b8792a" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- LPF marker line -->
  <line x1="640" y1="60" x2="640" y2="340" stroke="#b8792a" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- HPF label -->
  <text x="200" y="50" fill="#b8792a" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">HPF 60Hz</text>

  <!-- LPF label -->
  <text x="640" y="50" fill="#b8792a" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">LPF 14kHz</text>

  <!-- "CUT" labels in the removed zones -->
  <text x="130" y="200" fill="#a85a4a" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.5">CUT</text>
  <text x="690" y="200" fill="#a85a4a" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.5">CUT</text>

  <!-- Matrix bus labels along the top right -->
  <g fill="#4a7a9a" font-family="monospace" font-size="10" opacity="0.6">
    <text x="720" y="80" text-anchor="end">MX2 Vocal</text>
    <text x="720" y="93" text-anchor="end">MX3 Rhythm</text>
    <text x="720" y="106" text-anchor="end">MX4 Lead</text>
    <text x="720" y="119" text-anchor="end">MX5 Bass</text>
    <text x="720" y="132" text-anchor="end">MX6 Drums</text>
    <text x="720" y="145" text-anchor="end">MX7 Piano</text>
    <text x="720" y="158" text-anchor="end">MX8 Spare</text>
  </g>
</svg>
