<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#4a4740" stroke-width="2" />

  <!-- Zero marker (Model 12's zero) -->
  <line x1="400" y1="170" x2="400" y2="230" stroke="#b8792a" stroke-width="3" />
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="14" fill="#b8792a">00:00:00:00</text>

  <!-- Tick marks to the left (negative territory) -->
  <line x1="160" y1="190" x2="160" y2="210" stroke="#4a4740" stroke-width="1" />
  <line x1="240" y1="190" x2="240" y2="210" stroke="#4a4740" stroke-width="1" />
  <line x1="320" y1="190" x2="320" y2="210" stroke="#4a4740" stroke-width="1" />

  <!-- Tick marks to the right -->
  <line x1="480" y1="190" x2="480" y2="210" stroke="#4a4740" stroke-width="1" />
  <line x1="560" y1="190" x2="560" y2="210" stroke="#4a4740" stroke-width="1" />
  <line x1="640" y1="190" x2="640" y2="210" stroke="#4a4740" stroke-width="1" />

  <!-- Bar numbers below ticks -->
  <text x="160" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">-9</text>
  <text x="240" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">-6</text>
  <text x="320" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">-3</text>
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="13" fill="#b8792a" font-weight="bold">0</text>
  <text x="480" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">3</text>
  <text x="560" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">6</text>
  <text x="640" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a4740">9</text>

  <!-- The "expected" bar 1 marker far to the right (off-screen, shown as arrow) -->
  <line x1="700" y1="200" x2="720" y2="200" stroke="#a85a4a" stroke-width="2" stroke-dasharray="4,3" />
  <polygon points="720,195 730,200 720,205" fill="#a85a4a" />
  <text x="720" y="160" text-anchor="end" font-family="monospace" font-size="11" fill="#a85a4a">01:00:00:00</text>
  <text x="720" y="145" text-anchor="end" font-family="monospace" font-size="10" fill="#a85a4a">Bar 1 (Logic default)</text>

  <!-- Playhead indicator at the zero mark -->
  <polygon points="392,170 408,170 400,155" fill="#b8792a" />

  <!-- Model 12 label on the left -->
  <text x="80" y="120" font-family="monospace" font-size="11" fill="#4a4740">MODEL 12</text>
  <text x="80" y="135" font-family="monospace" font-size="11" fill="#4a4740">says: HERE</text>

  <!-- Logic label -->
  <text x="80" y="320" font-family="monospace" font-size="11" fill="#a85a4a">LOGIC</text>
  <text x="80" y="335" font-family="monospace" font-size="11" fill="#a85a4a">says: bar -9</text>

  <!-- Connecting lines from labels -->
  <line x1="145" y1="125" x2="390" y2="175" stroke="#4a4740" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4" />
  <line x1="145" y1="325" x2="155" y2="275" stroke="#a85a4a" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4" />
</svg>
