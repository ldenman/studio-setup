<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#2a2825"/>

  <!-- Left meter (digital) -->
  <g transform="translate(200, 40)">
    <!-- Meter housing -->
    <rect x="0" y="0" width="60" height="280" rx="4" fill="#4a4740" stroke="#b8792a" stroke-width="1.5"/>
    <!-- Scale marks -->
    <line x1="8" y1="28" x2="18" y2="28" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="32" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">0</text>
    <line x1="8" y1="56" x2="18" y2="56" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="60" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-6</text>
    <line x1="8" y1="84" x2="18" y2="84" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="88" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-12</text>
    <line x1="8" y1="112" x2="18" y2="112" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="116" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-18</text>
    <line x1="8" y1="140" x2="18" y2="140" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="144" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-24</text>
    <line x1="8" y1="168" x2="18" y2="168" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="172" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-30</text>
    <line x1="8" y1="196" x2="18" y2="196" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="200" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-36</text>
    <line x1="8" y1="224" x2="18" y2="224" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="228" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-42</text>
    <line x1="8" y1="252" x2="18" y2="252" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="256" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-48</text>

    <!-- Level bar - at -18dBFS -->
    <rect x="8" y="112" width="12" height="148" rx="1" fill="#4a7a9a" opacity="0.9"/>
    <!-- Peak indicator line at -18 -->
    <line x1="5" y1="112" x2="23" y2="112" stroke="#4a7a9a" stroke-width="2"/>

    <!-- Label -->
    <text x="30" y="300" fill="#4a7a9a" font-family="monospace" font-size="13" text-anchor="middle">dBFS</text>
    <text x="30" y="318" fill="#f4f3ee" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">-18</text>
  </g>

  <!-- Right meter (analog) -->
  <g transform="translate(540, 40)">
    <!-- Meter housing -->
    <rect x="0" y="0" width="60" height="280" rx="4" fill="#4a4740" stroke="#b8792a" stroke-width="1.5"/>
    <!-- Scale marks -->
    <line x1="8" y1="28" x2="18" y2="28" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="32" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">0</text>
    <line x1="8" y1="56" x2="18" y2="56" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="60" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-6</text>
    <line x1="8" y1="84" x2="18" y2="84" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="88" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-12</text>
    <line x1="8" y1="112" x2="18" y2="112" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="116" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-18</text>
    <line x1="8" y1="140" x2="18" y2="140" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="144" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-24</text>
    <line x1="8" y1="168" x2="18" y2="168" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="172" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-30</text>
    <line x1="8" y1="196" x2="18" y2="196" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="200" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-36</text>
    <line x1="8" y1="224" x2="18" y2="224" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="228" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-42</text>
    <line x1="8" y1="252" x2="18" y2="252" stroke="#f4f3ee" stroke-width="1" opacity="0.5"/>
    <text x="22" y="256" fill="#f4f3ee" font-family="monospace" font-size="10" opacity="0.5">-48</text>

    <!-- Level bar - at -12dB (higher) -->
    <rect x="8" y="84" width="12" height="176" rx="1" fill="#b8792a" opacity="0.9"/>
    <!-- Peak indicator line at -12 -->
    <line x1="5" y1="84" x2="23" y2="84" stroke="#b8792a" stroke-width="2"/>

    <!-- Label -->
    <text x="30" y="300" fill="#b8792a" font-family="monospace" font-size="13" text-anchor="middle">dB</text>
    <text x="30" y="318" fill="#f4f3ee" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">-12</text>
  </g>

  <!-- Center connection: the signal path -->
  <!-- D/A converter box -->
  <rect x="320" y="130" width="160" height="60" rx="6" fill="none" stroke="#f4f3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="155" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.7">D/A CONVERTER</text>
  <text x="400" y="172" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.4">-18dBFS = 0dBVU</text>

  <!-- Signal flow arrows -->
  <!-- USB arrow (left) -->
  <line x1="270" y1="152" x2="318" y2="152" stroke="#4a7a9a" stroke-width="1.5"/>
  <polygon points="270,152 278,148 278,156" fill="#4a7a9a"/>
  <text x="294" y="142" fill="#4a7a9a" font-family="monospace" font-size="9" text-anchor="middle">USB</text>

  <!-- Analog arrow (right) -->
  <line x1="482" y1="160" x2="530" y2="160" stroke="#b8792a" stroke-width="1.5"/>
  <polygon points="530,160 522,156 522,164" fill="#b8792a"/>
  <text x="506" y="150" fill="#b8792a" font-family="monospace" font-size="9" text-anchor="middle">TRS</text>

  <!-- The gap annotation -->
  <text x="400" y="240" fill="#f4f3ee" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" opacity="0.15">6 dB</text>

  <!-- Device labels -->
  <text x="230" y="380" fill="#4a7a9a" font-family="monospace" font-size="14" text-anchor="middle">Logic Pro</text>
  <text x="570" y="380" fill="#b8792a" font-family="monospace" font-size="14" text-anchor="middle">Model 12</text>

  <!-- Same signal label -->
  <text x="400" y="380" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.4">same signal</text>
</svg>
