<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#4a4740" stroke-width="0.5" opacity="0.08" />
  <line x1="400" y1="0" x2="400" y2="400" stroke="#4a4740" stroke-width="0.5" opacity="0.08" />

  <!-- === CONSOLE (center) === -->
  <!-- Console body -->
  <rect x="270" y="100" width="260" height="200" rx="4" fill="none" stroke="#b8792a" stroke-width="2" />

  <!-- Channel strips: left half (live inputs) -->
  <rect x="285" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="297" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="309" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="321" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="333" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="345" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.15" />
  <rect x="357" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.2" />
  <rect x="369" y="120" width="8" height="120" rx="1" fill="#b8792a" opacity="0.2" />

  <!-- Divider line between live and tape returns -->
  <line x1="385" y1="115" x2="385" y2="245" stroke="#b8792a" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3" />

  <!-- Channel strips: right half (tape returns) -->
  <rect x="393" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="405" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="417" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="429" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="441" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="453" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.15" />
  <rect x="465" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.2" />
  <rect x="477" y="120" width="8" height="120" rx="1" fill="#4a7a9a" opacity="0.2" />

  <!-- Fader knobs on channel strips -->
  <rect x="286" y="195" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="298" y="185" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="310" y="190" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="322" y="200" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="334" y="180" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="346" y="192" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="358" y="188" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />
  <rect x="370" y="196" width="6" height="10" rx="1" fill="#b8792a" opacity="0.5" />

  <rect x="394" y="188" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="406" y="195" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="418" y="182" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="430" y="192" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="442" y="200" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="454" y="186" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="466" y="194" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />
  <rect x="478" y="190" width="6" height="10" rx="1" fill="#4a7a9a" opacity="0.5" />

  <!-- Master section -->
  <rect x="497" y="130" width="20" height="100" rx="2" fill="none" stroke="#b8792a" stroke-width="1" opacity="0.3" />
  <rect x="501" y="170" width="12" height="16" rx="2" fill="#b8792a" opacity="0.4" />

  <!-- Console label -->
  <text x="400" y="275" font-family="monospace" font-size="10" fill="#b8792a" text-anchor="middle" opacity="0.6">console</text>

  <!-- Labels for halves -->
  <text x="335" y="252" font-family="monospace" font-size="8" fill="#b8792a" text-anchor="middle" opacity="0.4">live</text>
  <text x="440" y="252" font-family="monospace" font-size="8" fill="#4a7a9a" text-anchor="middle" opacity="0.4">tape returns</text>

  <!-- === TAPE MACHINE (right) === -->
  <!-- Tape machine body -->
  <rect x="620" y="120" width="140" height="160" rx="4" fill="none" stroke="#4a7a9a" stroke-width="2" />

  <!-- Reels -->
  <circle cx="665" cy="180" r="28" fill="none" stroke="#4a7a9a" stroke-width="1.5" opacity="0.3" />
  <circle cx="665" cy="180" r="12" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.4" />
  <circle cx="665" cy="180" r="3" fill="#4a7a9a" opacity="0.5" />

  <circle cx="735" cy="180" r="28" fill="none" stroke="#4a7a9a" stroke-width="1.5" opacity="0.3" />
  <circle cx="735" cy="180" r="18" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.3" />
  <circle cx="735" cy="180" r="3" fill="#4a7a9a" opacity="0.5" />

  <!-- Tape path between reels -->
  <path d="M665,152 Q690,140 700,145 Q710,150 735,152" fill="none" stroke="#4a7a9a" stroke-width="1.5" opacity="0.5" />

  <!-- Head block -->
  <rect x="688" y="140" width="24" height="8" rx="1" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.4" />

  <!-- Transport buttons -->
  <circle cx="660" cy="250" r="6" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.3" />
  <rect x="674" y="245" width="10" height="10" rx="1" fill="none" stroke="#4a7a9a" stroke-width="1" opacity="0.3" />
  <circle cx="700" cy="250" r="6" fill="#5a8a4a" opacity="0.3" />
  <circle cx="716" cy="250" r="6" fill="#a85a4a" opacity="0.4" />

  <!-- Tape label -->
  <text x="690" y="295" font-family="monospace" font-size="10" fill="#4a7a9a" text-anchor="middle" opacity="0.6">tape machine</text>

  <!-- === OUTBOARD RACK (left) === -->
  <!-- Rack body -->
  <rect x="40" y="110" width="150" height="180" rx="4" fill="none" stroke="#a85a4a" stroke-width="2" />

  <!-- Unit 1: Preamp (knobs) -->
  <rect x="52" y="125" width="126" height="32" rx="2" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.4" />
  <circle cx="78" cy="141" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="78" cy="141" r="2" fill="#a85a4a" opacity="0.4" />
  <circle cx="103" cy="141" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="103" cy="141" r="2" fill="#a85a4a" opacity="0.4" />
  <circle cx="128" cy="141" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="128" cy="141" r="2" fill="#a85a4a" opacity="0.4" />
  <rect x="148" y="133" width="18" height="16" rx="2" fill="none" stroke="#a85a4a" stroke-width="0.5" opacity="0.3" />

  <!-- Unit 2: Compressor (meters/buttons) -->
  <rect x="52" y="165" width="126" height="32" rx="2" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.4" />
  <rect x="64" y="174" width="40" height="4" rx="1" fill="#a85a4a" opacity="0.2" />
  <rect x="64" y="174" width="25" height="4" rx="1" fill="#a85a4a" opacity="0.4" />
  <rect x="64" y="182" width="40" height="4" rx="1" fill="#a85a4a" opacity="0.2" />
  <rect x="64" y="182" width="32" height="4" rx="1" fill="#a85a4a" opacity="0.3" />
  <circle cx="128" cy="181" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="148" cy="181" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />

  <!-- Unit 3: Compressor/Leveler -->
  <rect x="52" y="205" width="126" height="32" rx="2" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.4" />
  <rect x="64" y="215" width="50" height="12" rx="2" fill="none" stroke="#a85a4a" stroke-width="0.5" opacity="0.3" />
  <!-- VU meter needle -->
  <line x1="75" y1="225" x2="95" y2="217" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="128" cy="221" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="148" cy="221" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />

  <!-- Unit 4: Another unit -->
  <rect x="52" y="245" width="126" height="32" rx="2" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.4" />
  <circle cx="78" cy="261" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <circle cx="103" cy="261" r="7" fill="none" stroke="#a85a4a" stroke-width="1" opacity="0.5" />
  <rect x="122" y="254" width="44" height="14" rx="2" fill="none" stroke="#a85a4a" stroke-width="0.5" opacity="0.3" />
  <line x1="130" y1="265" x2="150" y2="257" stroke="#a85a4a" stroke-width="1" opacity="0.4" />

  <!-- Outboard label -->
  <text x="115" y="305" font-family="monospace" font-size="10" fill="#a85a4a" text-anchor="middle" opacity="0.6">outboard</text>

  <!-- === SIGNAL FLOW ARROWS === -->

  <!-- Console to Outboard (send) -->
  <line x1="270" y1="160" x2="190" y2="160" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <polygon points="195,156 190,160 195,164" fill="#4a4740" opacity="0.4" />

  <!-- Outboard to Console (return) -->
  <line x1="190" y1="240" x2="270" y2="240" stroke="#b8792a" stroke-width="1.5" opacity="0.5" />
  <polygon points="265,236 270,240 265,244" fill="#b8792a" opacity="0.5" />

  <!-- Console to Tape (record) -->
  <line x1="530" y1="160" x2="620" y2="160" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <polygon points="615,156 620,160 615,164" fill="#4a4740" opacity="0.4" />

  <!-- Tape to Console (playback / tape returns) -->
  <line x1="620" y1="240" x2="530" y2="240" stroke="#4a7a9a" stroke-width="1.5" opacity="0.5" />
  <polygon points="535,236 530,240 535,244" fill="#4a7a9a" opacity="0.5" />

  <!-- Flow labels -->
  <text x="235" y="153" font-family="monospace" font-size="8" fill="#4a4740" text-anchor="middle" opacity="0.35">send</text>
  <text x="235" y="253" font-family="monospace" font-size="8" fill="#b8792a" text-anchor="middle" opacity="0.45">return</text>
  <text x="575" y="153" font-family="monospace" font-size="8" fill="#4a4740" text-anchor="middle" opacity="0.35">record</text>
  <text x="575" y="253" font-family="monospace" font-size="8" fill="#4a7a9a" text-anchor="middle" opacity="0.45">playback</text>

  <!-- === BOTTOM: Stereo output from console === -->
  <line x1="400" y1="300" x2="400" y2="360" stroke="#b8792a" stroke-width="1.5" opacity="0.3" />
  <polygon points="396,355 400,360 404,355" fill="#b8792a" opacity="0.3" />
  <text x="400" y="380" font-family="monospace" font-size="9" fill="#b8792a" text-anchor="middle" opacity="0.4">stereo mix</text>

  <!-- === TOP: Subtle title === -->
  <text x="400" y="50" font-family="monospace" font-size="12" fill="#4a4740" text-anchor="middle" opacity="0.25" letter-spacing="4">CONSOLE + TAPE + OUTBOARD</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#4a4740" stroke-width="0.5" opacity="0.08" />
</svg>
