<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Signal flow: dry recording -> amp sim -> outboard chain -> processed return -->

  <!-- Dry recording (left box - tape/recorder) -->
  <rect x="60" y="160" width="90" height="80" rx="4" fill="none" stroke="#4a4740" stroke-width="2" />
  <line x1="80" y1="185" x2="130" y2="185" stroke="#4a4740" stroke-width="1.5" />
  <line x1="80" y1="195" x2="130" y2="195" stroke="#4a4740" stroke-width="1.5" />
  <line x1="80" y1="205" x2="130" y2="205" stroke="#4a4740" stroke-width="1.5" />
  <line x1="80" y1="215" x2="130" y2="215" stroke="#4a4740" stroke-width="1.5" />
  <circle cx="92" cy="225" r="5" fill="none" stroke="#4a4740" stroke-width="1" />
  <circle cx="118" cy="225" r="5" fill="none" stroke="#4a4740" stroke-width="1" />

  <!-- Arrow: recorder to amp sim -->
  <line x1="150" y1="200" x2="225" y2="200" stroke="#b8792a" stroke-width="2" />
  <polygon points="225,194 237,200 225,206" fill="#b8792a" />

  <!-- Amp sim (triangle - amplifier symbol) -->
  <polygon points="240,170 240,230 300,200" fill="none" stroke="#a85a4a" stroke-width="2" />
  <line x1="255" y1="195" x2="275" y2="195" stroke="#a85a4a" stroke-width="1.5" />
  <line x1="265" y1="185" x2="265" y2="205" stroke="#a85a4a" stroke-width="1.5" />

  <!-- Arrow: amp sim to outboard -->
  <line x1="300" y1="200" x2="345" y2="200" stroke="#b8792a" stroke-width="2" />
  <polygon points="345,194 357,200 345,206" fill="#b8792a" />

  <!-- Outboard chain - three boxes representing HA73, 1176, Distressor -->
  <rect x="360" y="170" width="60" height="60" rx="3" fill="none" stroke="#4a7a9a" stroke-width="2" />
  <circle cx="390" cy="192" r="10" fill="none" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="390" y1="182" x2="396" y2="186" stroke="#4a7a9a" stroke-width="1.5" />

  <line x1="420" y1="200" x2="440" y2="200" stroke="#b8792a" stroke-width="2" />

  <rect x="440" y="170" width="60" height="60" rx="3" fill="none" stroke="#4a7a9a" stroke-width="2" />
  <line x1="455" y1="190" x2="485" y2="190" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="455" y1="190" x2="462" y2="205" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="462" y1="205" x2="478" y2="185" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="478" y1="185" x2="485" y2="190" stroke="#4a7a9a" stroke-width="1.5" />

  <line x1="500" y1="200" x2="520" y2="200" stroke="#b8792a" stroke-width="2" />

  <rect x="520" y="170" width="60" height="60" rx="3" fill="none" stroke="#4a7a9a" stroke-width="2" />
  <circle cx="550" cy="195" r="12" fill="none" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="550" y1="183" x2="558" y2="190" stroke="#4a7a9a" stroke-width="1.5" />
  <line x1="550" y1="183" x2="542" y2="190" stroke="#4a7a9a" stroke-width="1.5" />

  <!-- Arrow: outboard to return -->
  <line x1="580" y1="200" x2="635" y2="200" stroke="#b8792a" stroke-width="2" />
  <polygon points="635,194 647,200 635,206" fill="#b8792a" />

  <!-- Return / capture (right box - new recording) -->
  <rect x="650" y="160" width="90" height="80" rx="4" fill="none" stroke="#5a8a4a" stroke-width="2" />
  <line x1="670" y1="185" x2="720" y2="185" stroke="#5a8a4a" stroke-width="1.5" />
  <line x1="670" y1="195" x2="720" y2="195" stroke="#5a8a4a" stroke-width="1.5" />
  <line x1="670" y1="205" x2="720" y2="205" stroke="#5a8a4a" stroke-width="1.5" />
  <line x1="670" y1="215" x2="720" y2="215" stroke="#5a8a4a" stroke-width="1.5" />
  <circle cx="682" cy="225" r="5" fill="none" stroke="#5a8a4a" stroke-width="1" />
  <circle cx="708" cy="225" r="5" fill="none" stroke="#5a8a4a" stroke-width="1" />

  <!-- Loopback arrow (curved, underneath) -->
  <path d="M 695 240 Q 695 320 400 320 Q 105 320 105 240" fill="none" stroke="#b8792a" stroke-width="1.5" stroke-dasharray="6,4" />
  <polygon points="101,248 105,236 109,248" fill="#b8792a" />

  <!-- Subtle grid lines -->
  <line x1="40" y1="130" x2="760" y2="130" stroke="#a09d93" stroke-width="0.5" opacity="0.15" />
  <line x1="40" y1="270" x2="760" y2="270" stroke="#a09d93" stroke-width="0.5" opacity="0.15" />
</svg>
