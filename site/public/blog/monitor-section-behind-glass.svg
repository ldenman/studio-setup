<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Glass panel background -->
  <rect x="250" y="50" width="300" height="300" rx="8" fill="none" stroke="#4a4740" stroke-width="2" opacity="0.3" />
  <rect x="250" y="50" width="300" height="300" rx="8" fill="#f4f3ee" opacity="0.15" />

  <!-- Glass reflection lines -->
  <line x1="265" y1="60" x2="275" y2="340" stroke="#4a4740" stroke-width="0.5" opacity="0.15" />
  <line x1="285" y1="55" x2="295" y2="345" stroke="#4a4740" stroke-width="0.5" opacity="0.1" />

  <!-- Monitor section label -->
  <text x="400" y="85" font-family="monospace" font-size="12" fill="#4a4740" text-anchor="middle" opacity="0.5">/cfg/mon</text>

  <!-- Speaker icon (left) -->
  <rect x="320" y="120" width="20" height="30" rx="2" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <polygon points="340,115 370,100 370,160 340,150" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <!-- Sound waves -->
  <path d="M 378 118 Q 392 130, 378 142" fill="none" stroke="#4a4740" stroke-width="1.2" opacity="0.3" />
  <path d="M 385 110 Q 405 130, 385 150" fill="none" stroke="#4a4740" stroke-width="1.2" opacity="0.2" />

  <!-- DIM knob -->
  <circle cx="345" cy="210" r="18" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="345" y1="210" x2="345" y2="195" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <text x="345" y="240" font-family="monospace" font-size="9" fill="#4a4740" text-anchor="middle" opacity="0.4">DIM</text>

  <!-- Source selector -->
  <rect x="400" y="195" width="50" height="30" rx="3" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <text x="425" y="214" font-family="monospace" font-size="9" fill="#4a4740" text-anchor="middle" opacity="0.4">SRC</text>

  <!-- MONO button -->
  <circle cx="470" cy="210" r="12" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <text x="470" y="214" font-family="monospace" font-size="8" fill="#4a4740" text-anchor="middle" opacity="0.4">M</text>

  <!-- Headphone icon -->
  <path d="M 370 280 Q 370 260, 390 255 Q 410 250, 430 260 Q 440 265, 440 280" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <rect x="365" y="278" width="12" height="18" rx="3" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <rect x="433" y="278" width="12" height="18" rx="3" fill="none" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />

  <!-- Left side: accessible parameters (connected, green) -->
  <!-- Channel strip -->
  <rect x="60" y="110" width="50" height="180" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <rect x="72" y="220" width="26" height="50" rx="2" stroke="#5a8a4a" stroke-width="1" fill="none" opacity="0.6" />
  <rect x="72" y="240" width="26" height="6" rx="1" fill="#5a8a4a" />
  <text x="85" y="140" font-family="monospace" font-size="8" fill="#5a8a4a" text-anchor="middle">CH</text>

  <!-- Bus -->
  <rect x="60" y="310" width="50" height="30" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <text x="85" y="330" font-family="monospace" font-size="8" fill="#5a8a4a" text-anchor="middle">BUS</text>

  <!-- FX -->
  <rect x="130" y="170" width="50" height="30" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <text x="155" y="189" font-family="monospace" font-size="8" fill="#5a8a4a" text-anchor="middle">FX</text>

  <!-- Matrix (accessible) -->
  <rect x="130" y="310" width="50" height="30" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <text x="155" y="330" font-family="monospace" font-size="8" fill="#5a8a4a" text-anchor="middle">MTX</text>

  <!-- TCP arrows going to accessible items -->
  <text x="30" y="200" font-family="monospace" font-size="9" fill="#5a8a4a" transform="rotate(-90, 30, 200)">TCP</text>
  <line x1="40" y1="155" x2="55" y2="155" stroke="#5a8a4a" stroke-width="1.5" />
  <polygon points="53,151 60,155 53,159" fill="#5a8a4a" />
  <line x1="40" y1="185" x2="125" y2="185" stroke="#5a8a4a" stroke-width="1.5" />
  <polygon points="123,181 130,185 123,189" fill="#5a8a4a" />

  <!-- Blocked arrow to monitor section -->
  <line x1="200" y1="200" x2="240" y2="200" stroke="#a85a4a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5" />
  <line x1="234" y1="192" x2="248" y2="208" stroke="#a85a4a" stroke-width="2.5" />
  <line x1="248" y1="192" x2="234" y2="208" stroke="#a85a4a" stroke-width="2.5" />

  <!-- Right side: UDP arrow (one-way, goes in but doesn't come back) -->
  <text x="620" y="195" font-family="monospace" font-size="9" fill="#b8792a">UDP</text>
  <line x1="610" y1="200" x2="560" y2="200" stroke="#b8792a" stroke-width="1.5" />
  <polygon points="562,196 555,200 562,204" fill="#b8792a" />

  <!-- No return arrow label -->
  <line x1="560" y1="220" x2="610" y2="220" stroke="#b8792a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.3" />
  <text x="635" y="224" font-family="monospace" font-size="8" fill="#b8792a" opacity="0.5">no reply</text>

  <!-- Right side labels -->
  <text x="700" y="140" font-family="monospace" font-size="10" fill="#5a8a4a" text-anchor="end">read + write</text>
  <line x1="640" y1="145" x2="700" y2="145" stroke="#5a8a4a" stroke-width="1" />

  <text x="700" y="170" font-family="monospace" font-size="10" fill="#b8792a" text-anchor="end">write only</text>
  <line x1="640" y1="175" x2="700" y2="175" stroke="#b8792a" stroke-width="1" />

  <text x="700" y="200" font-family="monospace" font-size="10" fill="#a85a4a" text-anchor="end">unreachable</text>
  <line x1="640" y1="205" x2="700" y2="205" stroke="#a85a4a" stroke-width="1" stroke-dasharray="4,3" />
</svg>
