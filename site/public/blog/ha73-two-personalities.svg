<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Channel A knob -->
  <circle cx="250" cy="200" r="70" fill="none" stroke="#4a4740" stroke-width="2.5" />
  <circle cx="250" cy="200" r="55" fill="none" stroke="#4a4740" stroke-width="1" opacity="0.3" />
  <circle cx="250" cy="200" r="6" fill="#4a4740" />
  <!-- Pointer at ~1 o'clock (about -30 degrees from top) -->
  <line x1="250" y1="200" x2="268" y2="138" stroke="#b8792a" stroke-width="3" stroke-linecap="round" />
  <!-- Tick marks for A -->
  <line x1="190" y1="240" x2="195" y2="235" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="185" y1="200" x2="192" y2="200" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="190" y1="160" x2="195" y2="165" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="220" y1="137" x2="224" y2="143" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="280" y1="137" x2="276" y2="143" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="310" y1="160" x2="305" y2="165" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="315" y1="200" x2="308" y2="200" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="310" y1="240" x2="305" y2="235" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <!-- Label A -->
  <text x="250" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#4a4740" letter-spacing="2">A</text>
  <text x="250" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#4a4740" opacity="0.5">1 o'clock</text>

  <!-- Channel B knob -->
  <circle cx="550" cy="200" r="70" fill="none" stroke="#4a4740" stroke-width="2.5" />
  <circle cx="550" cy="200" r="55" fill="none" stroke="#4a4740" stroke-width="1" opacity="0.3" />
  <circle cx="550" cy="200" r="6" fill="#4a4740" />
  <!-- Pointer at ~4 o'clock (about 120 degrees from top) -->
  <line x1="550" y1="200" x2="604" y2="231" stroke="#a85a4a" stroke-width="3" stroke-linecap="round" />
  <!-- Tick marks for B -->
  <line x1="490" y1="240" x2="495" y2="235" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="485" y1="200" x2="492" y2="200" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="490" y1="160" x2="495" y2="165" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="520" y1="137" x2="524" y2="143" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="580" y1="137" x2="576" y2="143" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="610" y1="160" x2="605" y2="165" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="615" y1="200" x2="608" y2="200" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <line x1="610" y1="240" x2="605" y2="235" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <!-- Label B -->
  <text x="550" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#4a4740" letter-spacing="2">B</text>
  <text x="550" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#4a4740" opacity="0.5">4 o'clock</text>

  <!-- Equals sign between them -->
  <line x1="380" y1="192" x2="420" y2="192" stroke="#b8792a" stroke-width="2.5" />
  <line x1="380" y1="208" x2="420" y2="208" stroke="#b8792a" stroke-width="2.5" />

  <!-- Matching meter bars at bottom corners -->
  <rect x="80" y="360" width="140" height="4" rx="2" fill="#4a4740" opacity="0.15" />
  <rect x="80" y="360" width="98" height="4" rx="2" fill="#b8792a" opacity="0.7" />
  <rect x="580" y="360" width="140" height="4" rx="2" fill="#4a4740" opacity="0.15" />
  <rect x="580" y="360" width="98" height="4" rx="2" fill="#a85a4a" opacity="0.7" />
</svg>
