<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#2a2825"/>

  <!-- Channel strips background -->
  <g transform="translate(80, 40)">
    <!-- Solo'd channel - highlighted -->
    <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740" stroke="#b8792a" stroke-width="2"/>
    <text x="30" y="24" fill="#b8792a" font-family="monospace" font-size="11" text-anchor="middle">CH 7</text>
    <text x="30" y="42" fill="#b8792a" font-family="monospace" font-size="9" text-anchor="middle">SOLO</text>
    <!-- Solo indicator light -->
    <circle cx="30" cy="58" r="6" fill="#b8792a"/>
    <!-- Fader slot -->
    <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
    <!-- Fader knob -->
    <rect x="18" y="140" width="24" height="12" rx="2" fill="#f4f3ee" data-fader="80,248"/>
    <!-- Meter -->
    <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
    <rect x="46" y="120" width="6" height="140" rx="1" fill="#5a8a4a" opacity="0.8"/>
    <!-- Label -->
    <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">M12 Mix</text>
  </g>

  <!-- Muted channels -->
  <g opacity="0.3">
    <g transform="translate(160, 40)">
      <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740"/>
      <text x="30" y="24" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle">CH 1</text>
      <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
      <rect x="18" y="200" width="24" height="12" rx="2" fill="#f4f3ee" opacity="0.4" data-fader="80,248"/>
      <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
      <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Vocal</text>
    </g>
    <g transform="translate(230, 40)">
      <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740"/>
      <text x="30" y="24" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle">CH 2</text>
      <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
      <rect x="18" y="190" width="24" height="12" rx="2" fill="#f4f3ee" opacity="0.4" data-fader="80,248"/>
      <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
      <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Guitar</text>
    </g>
    <g transform="translate(300, 40)">
      <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740"/>
      <text x="30" y="24" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle">CH 17</text>
      <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
      <rect x="18" y="170" width="24" height="12" rx="2" fill="#f4f3ee" opacity="0.4" data-fader="80,248"/>
      <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
      <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Vox Proc</text>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#4a4740" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Buses - still active, shown bright -->
  <g transform="translate(430, 40)">
    <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740" stroke="#a85a4a" stroke-width="1.5"/>
    <text x="30" y="24" fill="#a85a4a" font-family="monospace" font-size="11" text-anchor="middle">BUS 2</text>
    <text x="30" y="42" fill="#a85a4a" font-family="monospace" font-size="8" text-anchor="middle">ON MAIN</text>
    <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
    <rect x="18" y="150" width="24" height="12" rx="2" fill="#f4f3ee" data-fader="80,248"/>
    <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
    <rect x="46" y="140" width="6" height="120" rx="1" fill="#a85a4a" opacity="0.7"/>
    <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Outboard</text>
  </g>

  <g transform="translate(510, 40)">
    <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740" stroke="#a85a4a" stroke-width="1.5"/>
    <text x="30" y="24" fill="#a85a4a" font-family="monospace" font-size="11" text-anchor="middle">BUS 5</text>
    <text x="30" y="42" fill="#a85a4a" font-family="monospace" font-size="8" text-anchor="middle">ON MAIN</text>
    <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
    <rect x="18" y="160" width="24" height="12" rx="2" fill="#f4f3ee" data-fader="80,248"/>
    <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
    <rect x="46" y="150" width="6" height="110" rx="1" fill="#a85a4a" opacity="0.7"/>
    <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Elec Amp</text>
  </g>

  <g transform="translate(590, 40)">
    <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740" stroke="#a85a4a" stroke-width="1.5"/>
    <text x="30" y="24" fill="#a85a4a" font-family="monospace" font-size="11" text-anchor="middle">BUS 6</text>
    <text x="30" y="42" fill="#a85a4a" font-family="monospace" font-size="8" text-anchor="middle">ON MAIN</text>
    <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
    <rect x="18" y="155" width="24" height="12" rx="2" fill="#f4f3ee" data-fader="80,248"/>
    <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
    <rect x="46" y="145" width="6" height="115" rx="1" fill="#a85a4a" opacity="0.7"/>
    <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Acou Amp</text>
  </g>

  <g transform="translate(670, 40)">
    <rect x="0" y="0" width="60" height="320" rx="4" fill="#4a4740" stroke="#a85a4a" stroke-width="1.5"/>
    <text x="30" y="24" fill="#a85a4a" font-family="monospace" font-size="11" text-anchor="middle">BUS 3</text>
    <text x="30" y="42" fill="#a85a4a" font-family="monospace" font-size="8" text-anchor="middle">ON MAIN</text>
    <rect x="22" y="80" width="16" height="180" rx="2" fill="#2a2825"/>
    <rect x="18" y="165" width="24" height="12" rx="2" fill="#f4f3ee" data-fader="80,248"/>
    <rect x="46" y="80" width="6" height="180" rx="1" fill="#2a2825"/>
    <rect x="46" y="155" width="6" height="105" rx="1" fill="#a85a4a" opacity="0.7"/>
    <text x="30" y="290" fill="#f4f3ee" font-family="monospace" font-size="9" text-anchor="middle">Reverb</text>
  </g>

  <!-- Labels -->
  <text x="200" y="385" fill="#4a4740" font-family="monospace" font-size="12" text-anchor="middle">CHANNELS (solo'd)</text>
  <text x="580" y="385" fill="#a85a4a" font-family="monospace" font-size="12" text-anchor="middle">BUSES (ignoring solo)</text>
</svg>
