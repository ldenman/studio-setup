<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Channel strip -->
  <rect x="180" y="80" width="60" height="240" rx="4" stroke="#4a4740" stroke-width="2" fill="none" />

  <!-- Fader slot -->
  <rect x="195" y="220" width="30" height="80" rx="2" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.5" />
  <rect x="195" y="250" width="30" height="8" rx="1" fill="#4a4740" />

  <!-- Mute button - lit red -->
  <rect x="192" y="170" width="36" height="20" rx="3" fill="#a85a4a" />
  <text x="210" y="184" font-family="monospace" font-size="10" fill="#f4f3ee" text-anchor="middle">MUTE</text>

  <!-- Pre-fader send tap point -->
  <circle cx="240" cy="210" r="5" fill="#4a4740" />
  <text x="255" y="214" font-family="monospace" font-size="9" fill="#4a4740" opacity="0.6">PRE</text>

  <!-- Signal flow line from top into channel -->
  <line x1="210" y1="40" x2="210" y2="80" stroke="#4a7a9a" stroke-width="2.5" />
  <polygon points="204,78 210,88 216,78" fill="#4a7a9a" />

  <!-- Main output path (blocked) -->
  <line x1="210" y1="320" x2="210" y2="360" stroke="#a85a4a" stroke-width="2" stroke-dasharray="6,4" opacity="0.4" />
  <line x1="198" y1="340" x2="222" y2="360" stroke="#a85a4a" stroke-width="3" />
  <line x1="222" y1="340" x2="198" y2="360" stroke="#a85a4a" stroke-width="3" />

  <!-- Pre-fader send path (also blocked) -->
  <path d="M 245 210 Q 320 210, 380 180" stroke="#a85a4a" stroke-width="2" stroke-dasharray="6,4" opacity="0.4" />
  <line x1="365" y1="165" x2="395" y2="195" stroke="#a85a4a" stroke-width="3" />
  <line x1="395" y1="165" x2="365" y2="195" stroke="#a85a4a" stroke-width="3" />

  <!-- Bus (recording destination, dead) -->
  <rect x="400" y="140" width="120" height="40" rx="4" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.5" />
  <text x="460" y="165" font-family="monospace" font-size="11" fill="#4a4740" text-anchor="middle" opacity="0.4">REC BUS</text>

  <!-- Right side: the fix -->
  <!-- Channel strip 2 -->
  <rect x="540" y="80" width="60" height="240" rx="4" stroke="#4a4740" stroke-width="2" fill="none" />

  <!-- Fader slot 2 -->
  <rect x="555" y="220" width="30" height="80" rx="2" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.5" />
  <rect x="555" y="250" width="30" height="8" rx="1" fill="#4a4740" />

  <!-- Main off indicator (not mute) -->
  <rect x="552" y="170" width="36" height="20" rx="3" fill="none" stroke="#5a8a4a" stroke-width="1.5" />
  <text x="570" y="183" font-family="monospace" font-size="8" fill="#5a8a4a" text-anchor="middle">M.OFF</text>

  <!-- Pre-fader send tap point 2 -->
  <circle cx="600" cy="210" r="5" fill="#5a8a4a" />

  <!-- Signal flow in -->
  <line x1="570" y1="40" x2="570" y2="80" stroke="#4a7a9a" stroke-width="2.5" />
  <polygon points="564,78 570,88 576,78" fill="#4a7a9a" />

  <!-- Main output blocked (intentionally) -->
  <line x1="570" y1="320" x2="570" y2="360" stroke="#4a4740" stroke-width="2" stroke-dasharray="6,4" opacity="0.3" />
  <line x1="558" y1="340" x2="582" y2="360" stroke="#4a4740" stroke-width="2" opacity="0.3" />
  <line x1="582" y1="340" x2="558" y2="360" stroke="#4a4740" stroke-width="2" opacity="0.3" />

  <!-- Pre-fader send path (flowing) -->
  <path d="M 605 210 Q 660 210, 700 180" stroke="#5a8a4a" stroke-width="2.5" fill="none" />
  <polygon points="694,174 706,174 700,184" fill="#5a8a4a" />

  <!-- Bus 2 (recording destination, active) -->
  <rect x="660" y="140" width="120" height="40" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <text x="720" y="165" font-family="monospace" font-size="11" fill="#5a8a4a" text-anchor="middle">REC BUS</text>

  <!-- Labels -->
  <text x="210" y="30" font-family="monospace" font-size="11" fill="#a85a4a" text-anchor="middle">MUTED</text>
  <text x="570" y="30" font-family="monospace" font-size="11" fill="#5a8a4a" text-anchor="middle">MAIN OFF</text>
</svg>
