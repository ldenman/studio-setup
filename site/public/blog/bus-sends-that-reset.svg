<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background subtle grid suggesting a digital display -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#4a4740" stroke-width="0.5" opacity="0.2" />

  <!-- Left side: the send knob set correctly -->
  <!-- Channel strip -->
  <rect x="100" y="80" width="60" height="220" rx="4" stroke="#4a4740" stroke-width="2" fill="none" />

  <!-- Fader -->
  <rect x="115" y="200" width="30" height="70" rx="2" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.5" />
  <rect x="115" y="220" width="30" height="8" rx="1" fill="#4a4740" />

  <!-- Send knob - set to +10 -->
  <circle cx="130" cy="130" r="16" stroke="#5a8a4a" stroke-width="2" fill="none" />
  <line x1="130" y1="130" x2="143" y2="122" stroke="#5a8a4a" stroke-width="2.5" stroke-linecap="round" />
  <text x="130" y="160" font-family="monospace" font-size="10" fill="#5a8a4a" text-anchor="middle">+10</text>

  <!-- Signal flowing to bus -->
  <path d="M 165 130 Q 230 130, 280 160" stroke="#5a8a4a" stroke-width="2.5" fill="none" />
  <polygon points="274,154 286,160 276,168" fill="#5a8a4a" />

  <!-- Bus block -->
  <rect x="285" y="140" width="100" height="40" rx="4" stroke="#5a8a4a" stroke-width="1.5" fill="none" />
  <text x="335" y="165" font-family="monospace" font-size="11" fill="#5a8a4a" text-anchor="middle">BUS 10</text>

  <!-- Level meter next to bus - healthy -->
  <rect x="395" y="142" width="8" height="36" rx="1" stroke="#4a4740" stroke-width="1" fill="none" />
  <rect x="396" y="150" width="6" height="27" rx="1" fill="#5a8a4a" opacity="0.7" />

  <!-- Label -->
  <text x="130" y="60" font-family="monospace" font-size="11" fill="#5a8a4a" text-anchor="middle">SET</text>

  <!-- Center: the routing change that triggers reset -->
  <!-- Lightning bolt / disruption symbol -->
  <path d="M 430 120 L 445 170 L 435 170 L 448 220" stroke="#b8792a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <text x="440" y="250" font-family="monospace" font-size="9" fill="#b8792a" text-anchor="middle" opacity="0.8">ROUTE</text>
  <text x="440" y="262" font-family="monospace" font-size="9" fill="#b8792a" text-anchor="middle" opacity="0.8">CHANGE</text>

  <!-- Right side: the send after reset -->
  <!-- Channel strip -->
  <rect x="520" y="80" width="60" height="220" rx="4" stroke="#4a4740" stroke-width="2" fill="none" />

  <!-- Fader -->
  <rect x="535" y="200" width="30" height="70" rx="2" stroke="#4a4740" stroke-width="1.5" fill="none" opacity="0.5" />
  <rect x="535" y="220" width="30" height="8" rx="1" fill="#4a4740" />

  <!-- Send knob - reset to 0 -->
  <circle cx="550" cy="130" r="16" stroke="#a85a4a" stroke-width="2" fill="none" />
  <line x1="550" y1="130" x2="550" y2="114" stroke="#a85a4a" stroke-width="2.5" stroke-linecap="round" />
  <text x="550" y="160" font-family="monospace" font-size="10" fill="#a85a4a" text-anchor="middle">0</text>

  <!-- Signal to bus - weak/dashed -->
  <path d="M 585 130 Q 630 130, 660 160" stroke="#a85a4a" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.5" />

  <!-- Bus block -->
  <rect x="665" y="140" width="100" height="40" rx="4" stroke="#a85a4a" stroke-width="1.5" fill="none" opacity="0.5" />
  <text x="715" y="165" font-family="monospace" font-size="11" fill="#a85a4a" text-anchor="middle" opacity="0.5">BUS 10</text>

  <!-- Level meter next to bus - low -->
  <rect x="647" y="142" width="8" height="36" rx="1" stroke="#4a4740" stroke-width="1" fill="none" />
  <rect x="648" y="168" width="6" height="9" rx="1" fill="#a85a4a" opacity="0.5" />

  <!-- Label -->
  <text x="550" y="60" font-family="monospace" font-size="11" fill="#a85a4a" text-anchor="middle">RESET</text>

  <!-- Arrow showing time / progression -->
  <line x1="420" y1="340" x2="470" y2="340" stroke="#4a4740" stroke-width="1.5" opacity="0.4" />
  <polygon points="466,336 476,340 466,344" fill="#4a4740" opacity="0.4" />
</svg>
