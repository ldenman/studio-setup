<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#2a2825"/>

  <!-- Title area: two speaker outlines -->

  <!-- Left speaker -->
  <g transform="translate(200, 120)">
    <!-- Speaker cabinet -->
    <rect x="-50" y="-60" width="100" height="120" rx="6" fill="none" stroke="#4a4740" stroke-width="2"/>
    <!-- Woofer -->
    <circle cx="0" cy="10" r="32" fill="none" stroke="#4a4740" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="18" fill="none" stroke="#4a4740" stroke-width="1"/>
    <circle cx="0" cy="10" r="5" fill="#4a4740"/>
    <!-- Tweeter -->
    <circle cx="0" cy="-32" r="12" fill="none" stroke="#4a4740" stroke-width="1.5"/>
    <circle cx="0" cy="-32" r="4" fill="#4a4740"/>
    <!-- Label -->
    <text x="0" y="85" fill="#f4f3ee" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.6">OUT 7</text>
  </g>

  <!-- Right speaker -->
  <g transform="translate(600, 120)">
    <!-- Speaker cabinet -->
    <rect x="-50" y="-60" width="100" height="120" rx="6" fill="none" stroke="#4a4740" stroke-width="2"/>
    <!-- Woofer -->
    <circle cx="0" cy="10" r="32" fill="none" stroke="#4a4740" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="18" fill="none" stroke="#4a4740" stroke-width="1"/>
    <circle cx="0" cy="10" r="5" fill="#4a4740"/>
    <!-- Tweeter -->
    <circle cx="0" cy="-32" r="12" fill="none" stroke="#4a4740" stroke-width="1.5"/>
    <circle cx="0" cy="-32" r="4" fill="#4a4740"/>
    <!-- Label -->
    <text x="0" y="85" fill="#f4f3ee" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.6">OUT 8</text>
  </g>

  <!-- MX1 source box -->
  <rect x="350" y="270" width="100" height="40" rx="4" fill="none" stroke="#b8792a" stroke-width="1.5"/>
  <text x="400" y="295" fill="#b8792a" font-family="monospace" font-size="13" text-anchor="middle">MX1</text>

  <!-- Wrong path: both speakers fed from MX1 L (in=1) -->
  <!-- Line from MX1 to left speaker -->
  <line x1="375" y1="270" x2="200" y2="200" stroke="#b8792a" stroke-width="1.5" opacity="0.8"/>
  <!-- Line from MX1 to right speaker — same source -->
  <line x1="425" y1="270" x2="600" y2="200" stroke="#b8792a" stroke-width="1.5" opacity="0.8"/>

  <!-- in=1 labels on both lines (the error) -->
  <g>
    <rect x="248" y="225" width="50" height="18" rx="3" fill="#2a2825" stroke="#b8792a" stroke-width="1"/>
    <text x="273" y="238" fill="#b8792a" font-family="monospace" font-size="10" text-anchor="middle">in=1</text>
  </g>
  <g>
    <rect x="502" y="225" width="50" height="18" rx="3" fill="#2a2825" stroke="#b8792a" stroke-width="1"/>
    <text x="527" y="238" fill="#b8792a" font-family="monospace" font-size="10" text-anchor="middle">in=1</text>
  </g>

  <!-- Waveform coming out of left speaker — amber -->
  <g opacity="0.7">
    <path d="M 140 90 Q 130 70, 120 90 Q 110 110, 100 90 Q 90 68, 80 90" fill="none" stroke="#b8792a" stroke-width="2"/>
  </g>

  <!-- Same waveform coming out of right speaker — amber (identical = the problem) -->
  <g opacity="0.7">
    <path d="M 660 90 Q 670 70, 680 90 Q 690 110, 700 90 Q 710 68, 720 90" fill="none" stroke="#b8792a" stroke-width="2"/>
  </g>

  <!-- Equals sign between waveforms — they're the same -->
  <text x="400" y="95" fill="#b8792a" font-family="monospace" font-size="24" text-anchor="middle" opacity="0.5">=</text>

  <!-- Bottom annotation -->
  <text x="400" y="345" fill="#4a4740" font-family="monospace" font-size="11" text-anchor="middle">L</text>
  <text x="400" y="360" fill="#f4f3ee" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.4">both outputs pulling the same channel</text>

  <!-- Fix hint: crossed out in=1, replaced with in=2 on right side -->
  <g transform="translate(600, 230)">
    <!-- Strikethrough on wrong value -->
    <line x1="-8" y1="-5" x2="8" y2="5" stroke="#5a8a4a" stroke-width="1.5" opacity="0.6"/>
    <!-- Corrected value below -->
    <text x="0" y="18" fill="#5a8a4a" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.7">in=2</text>
  </g>
</svg>
