version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cp studio.edn site/studio.edn
        - cd site
        - npm ci
    build:
      commands:
        - PUBLIC_SHOW_DRAFTS=${PUBLIC_SHOW_DRAFTS:-false} npm run build
  artifacts:
    baseDirectory: site/dist
    files:
      - '**/*'
  cache:
    paths:
      - site/node_modules/**/*
