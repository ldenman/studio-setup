version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cp studio.edn site/studio.edn
        - cd site
        - npm ci
    build:
      commands:
        - |
          if [ "$AWS_BRANCH" = "dev" ]; then
            PUBLIC_SHOW_DRAFTS=true npm run build
          else
            npm run build
          fi
  artifacts:
    baseDirectory: site/dist
    files:
      - '**/*'
  cache:
    paths:
      - site/node_modules/**/*
